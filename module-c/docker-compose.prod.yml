services:
  module-c-backend:
    build: ./backend
    ports:
      - "8003:8003"
    environment:
      - MONITOR_URL=http://172.17.0.1:18000
      - HOST=0.0.0.0
      - PORT=8003
      - DEV_MODE=false
    restart: unless-stopped

  module-c-frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - module-c-backend
    restart: unless-stopped
