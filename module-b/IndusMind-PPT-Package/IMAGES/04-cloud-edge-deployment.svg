<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 12 6 0 12Z" fill="#367b89"/></marker>
    <style>
      .title{font:700 40px Arial,sans-serif;fill:#102d3d}.sub{font:400 20px Arial,sans-serif;fill:#607580}
      .h{font:700 27px Arial,sans-serif;fill:#153746}.t{font:400 19px Arial,sans-serif;fill:#506b77}.white{fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#f4f7f8"/>
  <text x="80" y="80" class="title">Cloud-to-Local Agent Deployment via ECS / frp</text>
  <text x="80" y="118" class="sub">The cloud server provides a stable relay; diagnosis and knowledge remain local</text>
  <g>
    <rect x="70" y="185" width="400" height="520" rx="28" fill="#fff" stroke="#a7bac2" stroke-width="3"/>
    <rect x="115" y="245" width="310" height="205" rx="14" fill="#173f55"/>
    <rect x="145" y="280" width="250" height="32" rx="8" fill="#6eb8c1"/>
    <rect x="145" y="335" width="110" height="78" rx="10" fill="#fff"/><rect x="275" y="335" width="120" height="78" rx="10" fill="#fff" opacity=".78"/>
    <path d="M180 379 205 355 228 388" fill="none" stroke="#f29c46" stroke-width="8"/>
    <text x="270" y="510" text-anchor="middle" class="h">CLOUD FRONTEND</text>
    <text x="270" y="548" text-anchor="middle" class="t">Submit diagnostic jobs</text>
    <text x="270" y="580" text-anchor="middle" class="t">Poll status and result</text>
    <rect x="140" y="620" width="260" height="45" rx="22" fill="#e8f1f3"/><text x="270" y="649" text-anchor="middle" class="t">POST / GET Async API</text>
  </g>
  <g>
    <rect x="600" y="235" width="400" height="420" rx="28" fill="#276f7c"/>
    <g fill="#fff"><rect x="705" y="295" width="190" height="65" rx="10"/><rect x="705" y="382" width="190" height="65" rx="10" opacity=".9"/><rect x="705" y="469" width="190" height="65" rx="10" opacity=".8"/></g>
    <g fill="#3d8290"><circle cx="740" cy="328" r="8"/><circle cx="770" cy="328" r="8"/><circle cx="740" cy="415" r="8"/><circle cx="770" cy="415" r="8"/><circle cx="740" cy="502" r="8"/><circle cx="770" cy="502" r="8"/></g>
    <text x="800" y="590" text-anchor="middle" class="h white">ALIYUN ECS RELAY</text>
    <text x="800" y="622" text-anchor="middle" class="t white">frps | systemd</text>
  </g>
  <g>
    <rect x="1130" y="185" width="400" height="520" rx="28" fill="#fff" stroke="#a7bac2" stroke-width="3"/>
    <rect x="1195" y="250" width="270" height="170" rx="14" fill="#183f54"/><rect x="1220" y="275" width="220" height="105" rx="8" fill="#e9f1f3"/>
    <circle cx="1330" cy="327" r="38" fill="#377f8d"/><path d="M1307 327 1325 345 1355 307" fill="none" stroke="#fff" stroke-width="9"/>
    <path d="M1270 420 1245 472H1415L1390 420Z" fill="#66818d"/>
    <text x="1330" y="525" text-anchor="middle" class="h">LOCAL DIAGNOSTIC AGENT</text>
    <text x="1330" y="563" text-anchor="middle" class="t">FastAPI | CrewAI Flow</text>
    <text x="1330" y="595" text-anchor="middle" class="t">Local KB | Dify | LLM</text>
    <rect x="1200" y="630" width="260" height="45" rx="22" fill="#e8f1f3"/><text x="1330" y="659" text-anchor="middle" class="t">launchd: Agent + frpc</text>
  </g>
  <g fill="none" stroke="#367b89" stroke-width="5" marker-end="url(#arr)"><path d="M470 390H600"/><path d="M1000 390H1130"/></g>
  <g fill="none" stroke="#f29c46" stroke-width="3" stroke-dasharray="9 9"><path d="M470 475H600"/><path d="M1000 475H1130"/></g>
  <text x="535" y="365" text-anchor="middle" class="t">PUBLIC API</text><text x="1065" y="365" text-anchor="middle" class="t">FRP TUNNEL</text>
  <g transform="translate(175 790)">
    <circle cx="0" cy="0" r="9" fill="#367b89"/><text x="25" y="7" class="t">Stable endpoint and process supervision</text>
    <circle cx="640" cy="0" r="9" fill="#f29c46"/><text x="665" y="7" class="t">Local host must remain online</text>
  </g>
